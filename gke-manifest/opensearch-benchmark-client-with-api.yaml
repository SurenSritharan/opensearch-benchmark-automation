apiVersion: v1
kind: Service
metadata:
  name: opensearch-benchmark-client
  labels:
    app: opensearch-benchmark
    component: client
spec:
  clusterIP: None
  selector:
    app: opensearch-benchmark
    component: client
---
apiVersion: v1
kind: Service
metadata:
  name: benchmark-api
  labels:
    app: opensearch-benchmark
    component: api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: opensearch-benchmark
    component: client
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: benchmark-nvme-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: premium-rwo
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: benchmark-results-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: premium-rwo
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: benchmark-workspace-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: premium-rwo
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-benchmark-client
  labels:
    app: opensearch-benchmark
    component: client
spec:
  serviceName: "opensearch-benchmark-client"
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-benchmark
      component: client
  template:
    metadata:
      labels:
        app: opensearch-benchmark
        component: client
    spec:
      # Explicit identity configuration to resolve the 401 Unauthorized K8s API issues
      serviceAccountName: default
      automountServiceAccountToken: true
      
      nodeSelector:
        cloud.google.com/gke-nodepool: client-pool
      
      containers:
      - name: benchmark
        image: python:3.11-slim
        command: ["/bin/bash", "-c"]
        args:
          - |
            set -e
            echo "Installing dependencies..."
            apt-get update -y -qq
            apt-get install -y -qq git curl wget vim libhdf5-dev gcc python3-dev jq nmon procps tini
            
            echo "Installing Python packages..."
            pip install --quiet h5py numpy scikit-learn opensearch-py flask flask-cors pyyaml gunicorn requests
            
            echo "Setting up directories..."
            mkdir -p /datasets/opensearch-benchmark /results /opt/benchmark-src /app/web
            
            echo "Cloning OpenSearch Benchmark..."
            git clone --depth 1 https://github.com/SurenSritharan/opensearch-benchmark /opt/benchmark-src
            cd /opt/benchmark-src
            pip install -e .
            
            if [ ! -d "/datasets/opensearch-benchmark-workloads/.git" ]; then
              echo "Cloning workloads..."
              git clone --depth 1 https://github.com/SurenSritharan/opensearch-benchmark-workloads.git /datasets/opensearch-benchmark-workloads
            else
              echo "Workloads already exist, pulling latest changes..."
              cd /datasets/opensearch-benchmark-workloads
              git pull origin main || echo "Git pull failed, using existing version"
            fi
            
            if [ ! -d "/workspace/.git" ]; then
              echo "Cloning benchmark automation project (first time)..."
              git clone --depth 1 https://github.com/SurenSritharan/opensearch-benchmark-automation.git /workspace-tmp
              mv /workspace-tmp/* /workspace/
              mv /workspace-tmp/.git /workspace/
              rm -rf /workspace-tmp
            else
              echo "Workspace already exists, pulling latest changes..."
              cd /workspace
              git pull origin main || echo "Git pull failed, using existing version"
            fi
            
            echo "Setting up cloud-native API service..."
            cp /workspace/cloud-service/*.py /app/
            cp -r /workspace/cloud-service/web /app/
            
            if [ -f "/workspace/cloud-service/requirements.txt" ]; then
              echo "Installing cloud-service requirements..."
              pip install --quiet -r /workspace/cloud-service/requirements.txt
            fi
            
            echo "Starting cloud-native API service..."
            cd /app
            exec /usr/bin/tini -- gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 300 --access-logfile - app:app
        
        env:
        - name: BENCHMARK_HOME
          value: "/datasets/opensearch-benchmark"
        - name: PYTHONUNBUFFERED
          value: "1"
        
        resources:
          requests:
            memory: "48Gi"
            cpu: "12"
          limits:
            memory: "48Gi"
            cpu: "16"
        
        volumeMounts:
        - name: datasets
          mountPath: /datasets
        - name: results
          mountPath: /results
        - name: certs
          mountPath: /certs
          readOnly: true
        - name: workspace
          mountPath: /workspace
        
        ports:
        - containerPort: 8080
          name: http
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 300 # Increased to allow apt-get, pip installs, and git clones to finish
          periodSeconds: 30
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 120 # Gives ample time for build sequence before checking app health
          periodSeconds: 10
      
      volumes:
      - name: datasets
        persistentVolumeClaim:
          claimName: benchmark-nvme-storage
      - name: results
        persistentVolumeClaim:
          claimName: benchmark-results-storage
      - name: certs
        secret:
          secretName: opensearch-shared-certs
          defaultMode: 0644
      - name: workspace
        persistentVolumeClaim:
          claimName: benchmark-workspace-storage

