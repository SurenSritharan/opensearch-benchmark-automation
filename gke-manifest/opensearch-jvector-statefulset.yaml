apiVersion: v1
kind: Service
metadata:
  name: opensearch-native
  namespace: os-jvector
  labels:
    app: opensearch-native
spec:
  clusterIP: None
  selector:
    app: opensearch-native
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-native-config
  namespace: os-jvector
data:
  opensearch.yml: |
    cluster.name: opensearch-cluster
    network.host: 0.0.0.0
    
    discovery.seed_hosts:
      - opensearch-cluster.os-jvector.svc.cluster.local
    cluster.initial_cluster_manager_nodes:
      - opensearch-native-0
    
    discovery.seed_resolver.timeout: 10s
    discovery.seed_resolver.max_concurrent_resolvers: 3
    
    plugins.security.disabled: false
    plugins.security.allow_default_init_securityindex: true
    plugins.security.allow_unsafe_democertificates: true
    
    plugins.security.ssl.http.enabled: true
    plugins.security.ssl.http.pemcert_filepath: certs/esnode.pem
    plugins.security.ssl.http.pemkey_filepath: certs/esnode-key.pem
    plugins.security.ssl.http.pemtrustedcas_filepath: certs/root-ca.pem
    
    plugins.security.ssl.transport.pemcert_filepath: certs/esnode.pem
    plugins.security.ssl.transport.pemkey_filepath: certs/esnode-key.pem
    plugins.security.ssl.transport.pemtrustedcas_filepath: certs/root-ca.pem
    plugins.security.ssl.transport.enforce_hostname_verification: false
    plugins.security.ssl.transport.resolve_hostname: false
    
    plugins.security.authcz.admin_dn:
      - CN=kirk,OU=client,O=client,L=test,C=de
    
    plugins.security.nodes_dn:
      - "CN=opensearch-node,OU=SSL,O=Test,L=Test,ST=Test,C=DE"
    
    action.auto_create_index: true
    
    cluster.routing.allocation.disk.threshold_enabled: true
    cluster.routing.allocation.disk.watermark.low: 80%
    cluster.routing.allocation.disk.watermark.high: 85%
    cluster.routing.allocation.disk.watermark.flood_stage: 90%
    
    thread_pool.write.size: 8
    thread_pool.write.queue_size: 2000
    thread_pool.search.size: 13
    thread_pool.search.queue_size: 2000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-native
  namespace: os-jvector
spec:
  serviceName: opensearch-native # FIX: Linked with the discovery layer above
  replicas: 3
  selector:
    matchLabels:
      app: opensearch-native
  template:
    metadata:
      labels:
        app: opensearch-native
    spec:
      initContainers:
        # FIX: Streamlined JVector plugin installation with robust target checks
        - name: install-jvector-plugin
          image: opensearchproject/opensearch:3.6.0
          command:
            - bash
            - -c
            - |
              set -e
              echo "Installing JVector Plugin..."
              cp -r /usr/share/opensearch/plugins/* /usr/share/opensearch/plugins-shared/
              
              curl -sL https://repo1.maven.org/maven2/org/opensearch/plugin/opensearch-jvector-plugin/3.6.0.0/opensearch-jvector-plugin-3.6.0.0.zip -o /tmp/jvector.zip
              
              rm -rf /usr/share/opensearch/plugins-shared/opensearch-neural-search
              rm -rf /usr/share/opensearch/plugins-shared/opensearch-knn
              
              mkdir -p /usr/share/opensearch/plugins-shared/opensearch-jvector
              cd /usr/share/opensearch/plugins-shared/opensearch-jvector
              jar xf /tmp/jvector.zip
              echo "JVector plugin installed successfully!"
          volumeMounts:
            - name: plugins
              mountPath: /usr/share/opensearch/plugins-shared
        
        - name: sysctl
          image: busybox:1.36
          command:
            - sh
            - -c
            - "sysctl -w vm.max_map_count=262144"
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
      
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:3.6.0
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID
            runAsUser: 1000
            runAsNonRoot: true
          env:
            - name: cluster.name
              value: "opensearch-cluster"
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms13g -Xmx13g"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              value: "admin"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
          resources:
            requests:
              memory: "27Gi"
              cpu: "7000m"
            limits:
              memory: "27Gi"
              cpu: "8000m"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
            - name: plugins
              mountPath: /usr/share/opensearch/plugins
            - name: config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
            - name: certs
              mountPath: /usr/share/opensearch/config/certs
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -k -u admin:admin https://localhost:9200/_cluster/health?local=true | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe: # FIX: Complete structural syntax rewrite 
            exec:
              command:
                - sh
                - -c
                - "curl -k -u admin:admin https://localhost:9200/_cluster/health?local=true | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: opensearch-native-config
        - name: plugins
          emptyDir: {}
        - name: certs
          secret:
            secretName: opensearch-shared-certs # Assumes your shared secret matches this name
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: premium-rwo
        resources:
          requests:
            storage: 600Gi
