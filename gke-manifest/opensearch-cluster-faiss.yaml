apiVersion: opensearch.opster.io/v1
kind: OpenSearchCluster
metadata:
  name: opensearch-cluster-2
  namespace: os-faiss
spec:
  general:
    serviceName: opensearch-cluster-2
    version: 3.6.0-0-r01
    httpPort: 9200
    vendor: opensearch
    # Standard OpenSearch image with FAISS support
    image: opensearchproject/opensearch:3.6.0
    
    # Security enabled with SSL/TLS
    additionalConfig:
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "MyStrongPassword123!@#"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      # KNN settings optimized for FAISS
      knn.size: "100"
      knn.queue_size: "1000"
      knn.memory.circuit_breaker.enabled: "true"
      knn.memory.circuit_breaker.limit: "90%"
      knn.circuit_breaker.triggered: "false"
      knn.cache.item.expiry.enabled: "false"
      knn.cache.item.expiry.minutes: "180m"
      # Index settings
      action.auto_create_index: "true"
      # Cluster settings
      cluster.routing.allocation.disk.threshold_enabled: "true"
      cluster.routing.allocation.disk.watermark.low: "80%"
      cluster.routing.allocation.disk.watermark.high: "85%"
      cluster.routing.allocation.disk.watermark.flood_stage: "90%"
    
    setVMMaxMapCount: true
    drainDataNodes: true
  
  # Security configuration
  security:
    tls:
      transport:
        generate: true
        perNode: false
      http:
        generate: true
    
  # Node pools configuration
  nodePools:
    # Master/data nodes (3 replicas)
    - component: masters
      replicas: 3
      diskSize: "600Gi"
      resources:
        requests:
          memory: "27Gi"
          cpu: "7000m"
        limits:
          memory: "27Gi"
          cpu: "8000m"
      roles:
        - "cluster_manager"
        - "data"
        - "ingest"
      persistence:
        emptyDir: {}
      
      # Thread pool settings
      additionalConfig:
        thread_pool.write.size: "8"
        thread_pool.write.queue_size: "2000"
        thread_pool.search.size: "6"
        thread_pool.search.queue_size: "500"
        http.max_content_length: "500mb"
      
      # Use server-pool node pool
      nodeSelector:
        cloud.google.com/gke-nodepool: server-pool
      
      # Spread across zones
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: opensearch.role
                      operator: In
                      values:
                        - cluster_manager
                topologyKey: topology.kubernetes.io/zone
  
  # OpenSearch Dashboards
  dashboards:
    enable: true
    version: 3.6.0-0-r01
    replicas: 1
    image: opensearchproject/opensearch-dashboards:3.6.0
    resources:
      requests:
        memory: "2Gi"
        cpu: "1000m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
    tls:
      enable: true
      generate: true

