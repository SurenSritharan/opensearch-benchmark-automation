apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-dashboards-config
  namespace: os-metrics
data:
  opensearch_dashboards.yml: |
    server.name: opensearch-dashboards
    server.host: "0.0.0.0"
    
    # Connect to metrics store
    opensearch.hosts: ["https://opensearch-metrics-store.os-metrics.svc.cluster.local:9200"]
    opensearch.ssl.verificationMode: none
    opensearch.username: "admin"
    opensearch.password: "admin"
    opensearch.requestHeadersWhitelist: ["securitytenant","Authorization"]
    
    # Security settings
    opensearch_security.multitenancy.enabled: false
    opensearch_security.readonly_mode.roles: ["kibana_read_only"]
    
    # Disable telemetry
    telemetry.enabled: false
    telemetry.optIn: false
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-dashboards
  namespace: os-metrics
  labels:
    app: opensearch-dashboards
spec:
  type: LoadBalancer
  selector:
    app: opensearch-dashboards
  ports:
    - name: http
      port: 5601
      targetPort: 5601
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: os-metrics
  labels:
    app: opensearch-dashboards
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-dashboards
  template:
    metadata:
      labels:
        app: opensearch-dashboards
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: server-pool
      
      containers:
        - name: opensearch-dashboards
          image: opensearchproject/opensearch-dashboards:3.6.0
          env:
            - name: OPENSEARCH_HOSTS
              value: "https://opensearch-metrics-store.os-metrics.svc.cluster.local:9200"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          ports:
            - containerPort: 5601
              name: http
          volumeMounts:
            - name: config
              mountPath: /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
              subPath: opensearch_dashboards.yml
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: opensearch-dashboards-config

