apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-metrics-store-config
  namespace: os-metrics
data:
  opensearch.yml: |
    cluster.name: opensearch-metrics-store
    network.host: 0.0.0.0
    
    node.roles: [cluster_manager, data, ingest]
    
    discovery.type: single-node
    
    plugins.security.disabled: false
    plugins.security.allow_default_init_securityindex: true
    plugins.security.allow_unsafe_democertificates: false
    
    plugins.security.ssl.http.enabled: true
    plugins.security.ssl.http.pemcert_filepath: certs/esnode.pem
    plugins.security.ssl.http.pemkey_filepath: certs/esnode-key.pem
    plugins.security.ssl.http.pemtrustedcas_filepath: certs/root-ca.pem
    
    plugins.security.ssl.transport.pemcert_filepath: certs/esnode.pem
    plugins.security.ssl.transport.pemkey_filepath: certs/esnode-key.pem
    plugins.security.ssl.transport.pemtrustedcas_filepath: certs/root-ca.pem
    plugins.security.ssl.transport.enforce_hostname_verification: false
    plugins.security.ssl.transport.resolve_hostname: false
    
    plugins.security.authcz.admin_dn:
      - "CN=admin,OU=Benchmark,O=OpenSearch,L=San Francisco,ST=CA,C=US"
    
    plugins.security.nodes_dn:
      - "CN=opensearch-node,OU=Benchmark,O=OpenSearch,L=San Francisco,ST=CA,C=US"
    
    action.auto_create_index: true
    
    # Optimize for metrics storage
    cluster.routing.allocation.disk.threshold_enabled: "true"
    cluster.routing.allocation.disk.watermark.low: "85%"
    cluster.routing.allocation.disk.watermark.high: "90%"
    cluster.routing.allocation.disk.watermark.flood_stage: "95%"
---
apiVersion: v1
kind: Namespace
metadata:
  name: os-metrics
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-metrics-store
  namespace: os-metrics
  labels:
    app: opensearch-metrics-store
spec:
  type: ClusterIP
  selector:
    app: opensearch-metrics-store
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-metrics-store
  namespace: os-metrics
spec:
  serviceName: opensearch-metrics-store
  replicas: 1
  selector:
    matchLabels:
      app: opensearch-metrics-store
  template:
    metadata:
      labels:
        app: opensearch-metrics-store
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: server-pool
      
      # Ensure metrics store doesn't run on same node as data nodes
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - opensearch-cluster
                      - opensearch-jvector
                      - opensearch-faiss
                      - opensearch-lucene
              topologyKey: kubernetes.io/hostname
      
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command:
            - sh
            - -c
            - "sysctl -w vm.max_map_count=262144"
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
      
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:3.6.0
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID
            runAsUser: 1000
            runAsNonRoot: true
          env:
            - name: cluster.name
              value: "opensearch-metrics-store"
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms4g -Xmx4g"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              value: "admin"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "false"
          resources:
            requests:
              memory: "8Gi"
              cpu: "2000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
            - name: config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
            - name: certs
              mountPath: /usr/share/opensearch/config/certs
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  # Check the API endpoint. We don't care if it's green/yellow yet;
                  # we just need to know the HTTPS server is awake and accepting credentials.
                  curl --fail -s -k \
                    --cert /usr/share/opensearch/config/certs/admin.pem \
                    --key /usr/share/opensearch/config/certs/admin-key.pem \
                    https://localhost:9200/_cluster/health?local=true
            # 30 tries * 10 seconds = Gives OpenSearch up to 5 full minutes to boot up completely
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  # Fails if status is red.
                  curl -s -k \
                    --cert /usr/share/opensearch/config/certs/admin.pem \
                    --key /usr/share/opensearch/config/certs/admin-key.pem \
                    https://localhost:9200/_cluster/health?local=true | grep -qE '"status":"(green|yellow)"'
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  curl --fail -s -k \
                    --cert /usr/share/opensearch/config/certs/admin.pem \
                    --key /usr/share/opensearch/config/certs/admin-key.pem \
                    https://localhost:9200/_cluster/health?local=true
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: opensearch-metrics-store-config
        - name: certs
          secret:
            secretName: opensearch-shared-certs
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: premium-rwo
        resources:
          requests:
            storage: 200Gi

