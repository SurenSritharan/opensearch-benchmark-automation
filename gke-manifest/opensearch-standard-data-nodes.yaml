apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-data-config
data:
  opensearch.yml: |
    cluster.name: opensearch-cluster
    network.host: 0.0.0.0
    
    node.roles: [data, ingest]
    
    discovery.seed_hosts:
      - opensearch-cluster-manager-0.opensearch-cluster-manager.${NAMESPACE}.svc.cluster.local
      - opensearch-data-0.opensearch-data.${NAMESPACE}.svc.cluster.local
      - opensearch-data-1.opensearch-data.${NAMESPACE}.svc.cluster.local
      - opensearch-data-2.opensearch-data.${NAMESPACE}.svc.cluster.local
    
    
    discovery.seed_resolver.timeout: 10s
    discovery.seed_resolver.max_concurrent_resolvers: 3
    
    plugins.security.disabled: false
    plugins.security.allow_default_init_securityindex: true
    plugins.security.allow_unsafe_democertificates: true
    
    plugins.security.ssl.http.enabled: true
    plugins.security.ssl.http.pemcert_filepath: certs/esnode.pem
    plugins.security.ssl.http.pemkey_filepath: certs/esnode-key.pem
    plugins.security.ssl.http.pemtrustedcas_filepath: certs/root-ca.pem
    
    plugins.security.ssl.transport.pemcert_filepath: certs/esnode.pem
    plugins.security.ssl.transport.pemkey_filepath: certs/esnode-key.pem
    plugins.security.ssl.transport.pemtrustedcas_filepath: certs/root-ca.pem
    plugins.security.ssl.transport.enforce_hostname_verification: false
    plugins.security.ssl.transport.resolve_hostname: false
    
    plugins.security.authcz.admin_dn:
      - "CN=admin,OU=Benchmark,O=OpenSearch,L=San Francisco,ST=CA,C=US"
    
    plugins.security.nodes_dn:
      - "CN=opensearch-node,OU=Benchmark,O=OpenSearch,L=San Francisco,ST=CA,C=US"
    
    action.auto_create_index: true
    
    cluster.routing.allocation.disk.threshold_enabled: true
    cluster.routing.allocation.disk.watermark.low: 80%
    cluster.routing.allocation.disk.watermark.high: 85%
    cluster.routing.allocation.disk.watermark.flood_stage: 90%
    
    thread_pool.write.size: 8
    thread_pool.write.queue_size: 2000
    thread_pool.search.size: 13
    thread_pool.search.queue_size: 2000
    
    knn.algo_param.index_thread_qty: 8
    knn.memory.circuit_breaker.enabled: true
    knn.memory.circuit_breaker.limit: 90%
    knn.cache.item.expiry.enabled: false
    knn.cache.item.expiry.minutes: "180m"
    knn.circuit_breaker.triggered: "false"
    
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-data
  labels:
    app: opensearch-data
spec:
  clusterIP: None
  selector:
    app: opensearch-data
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-cluster
  labels:
    app: opensearch-data
spec:
  type: ClusterIP
  selector:
    app: opensearch-data
  ports:
    - name: http
      port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch-data
spec:
  serviceName: opensearch-data
  replicas: 3
  selector:
    matchLabels:
      app: opensearch-data
  template:
    metadata:
      labels:
        app: opensearch-data
        node-role: data
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: server-pool
      
      initContainers:
        - name: install-async-profiler
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              echo "Installing async-profiler..."
              
              # Detect architecture
              ARCH=$(uname -m)
              if [ "$ARCH" = "x86_64" ]; then
                PROFILER_ARCH="linux-x64"
              elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                PROFILER_ARCH="linux-arm64"
              else
                echo "Unsupported architecture: $ARCH"
                exit 1
              fi
              
              # Download and install async-profiler
              cd /tmp
              wget -q https://github.com/async-profiler/async-profiler/releases/download/v4.4/async-profiler-4.4-${PROFILER_ARCH}.tar.gz
              tar -xzf async-profiler-4.4-${PROFILER_ARCH}.tar.gz
              mkdir -p /mnt/async-profiler
              mv async-profiler-4.4-${PROFILER_ARCH}/* /mnt/async-profiler/
              chmod +x /mnt/async-profiler/bin/asprof
              echo "async-profiler installed successfully!"
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: async-profiler
              mountPath: /mnt/async-profiler
        
        - name: sysctl
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -ex
              # Required for OpenSearch memory locking
              sysctl -w vm.max_map_count=262144
              
              # Required for async-profiler to read kernel space events without crashing
              sysctl -w kernel.perf_event_paranoid=1
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
      
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:3.6.0
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID
            runAsUser: 1000
            runAsNonRoot: true
          env:
            - name: cluster.name
              value: "opensearch-cluster"
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms13g -Xmx13g"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              value: "admin"
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
          resources:
            requests:
              memory: "27Gi"
              cpu: "7000m"
            limits:
              memory: "27Gi"
              cpu: "8000m"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
            - name: config
              mountPath: /usr/share/opensearch/config/opensearch.yml
              subPath: opensearch.yml
            - name: certs
              mountPath: /usr/share/opensearch/config/certs
            - name: async-profiler
              mountPath: /opt/async-profiler
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -k -u admin:admin https://localhost:9200/_cluster/health?local=true | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -k -u admin:admin https://localhost:9200/_cluster/health?local=true | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: opensearch-data-config
        - name: certs
          secret:
            secretName: opensearch-shared-certs
        - name: async-profiler
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: premium-rwo
        resources:
          requests:
            storage: 600Gi

