<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenSearch Benchmark - Cloud Service</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Gabarito, "Gabarito Fallback", ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            background-color: rgb(249, 250, 251);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(49, 130, 237, 0.08), rgba(0, 0, 0, 0) 28%),
                radial-gradient(circle at 100% 0%, rgba(11, 184, 218, 0.06), rgba(0, 0, 0, 0) 24%),
                linear-gradient(rgb(249, 250, 251), rgb(249, 250, 251));
            padding: 20px;
            color: rgb(15, 23, 41);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8;
        }
        h1 { color: rgb(15, 23, 41); margin-bottom: 10px; font-weight: 700; }
        .subtitle { color: #666; font-size: 14px; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-left: 10px; }
        .badge.cloud { background: #e3f2fd; color: #1976d2; }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: rgb(15, 23, 41); }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            transition: border-color 0.3s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.3);
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(59, 130, 246, 0.4);
        }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .job-list { margin-top: 20px; }
        .job-item {
            background: linear-gradient(135deg, #f6f8fa 0%, #ffffff 100%);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
            transition: all 0.3s;
            border: 1px solid #e1e4e8;
        }
        .job-item:hover {
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .job-item.running { border-left-color: #f59e0b; }
        .job-item.completed { border-left-color: #10b981; }
        .job-item.failed { border-left-color: #ef4444; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .status-queued { background: #e3f2fd; color: #1976d2; }
        .status-running { background: #fff3e0; color: #f57c00; }
        .status-completed { background: #e8f5e9; color: #388e3c; }
        .status-failed { background: #ffebee; color: #d32f2f; }
        .status-error { background: #ffebee; color: #d32f2f; }
        .info-text { font-size: 13px; color: #666; margin-top: 8px; }
        .error-msg { color: #d32f2f; font-size: 14px; margin-top: 10px; padding: 10px; background: #ffebee; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>🚀 OpenSearch Benchmark Service <span class="badge cloud">Cloud-Native</span></h1>
                    <p class="subtitle">Execute benchmarks directly without kubectl - reads from git repo</p>
                </div>
                <button id="syncBtn" onclick="syncConfig()" style="background: #4caf50; padding: 10px 20px;" title="Pull latest changes from git and reload configuration">
                    🔄 Sync from Git
                </button>
            </div>
        </div>

        <div class="card">
            <h2>Start New Benchmark</h2>
            <div id="errorMsg" class="error-msg" style="display: none;"></div>
            <form id="benchmarkForm">
                <div class="form-group">
                    <label>Dataset</label>
                    <select id="dataset" required>
                        <option value="">Loading...</option>
                    </select>
                    <div class="info-text" id="datasetInfo"></div>
                </div>
                <div class="form-group">
                    <label>Engine</label>
                    <select id="engine" required>
                        <option value="">Select dataset first</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Test Procedure</label>
                    <select id="scenario" required>
                        <option value="">Select dataset first</option>
                    </select>
                    <div class="info-text" id="scenarioInfo"></div>
                </div>
                <button type="submit">Start Benchmark</button>
            </form>
        </div>

        <div class="card">
            <h2>Recent Jobs</h2>
            <div id="jobList" class="job-list">Loading...</div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>📋 Benchmark Logs</h2>
                <div>
                    <label style="display: inline; margin-right: 10px; font-weight: normal;">
                        <input type="checkbox" id="autoRefreshLogs" checked> Auto-refresh (5s)
                    </label>
                    <button onclick="loadLogs()" style="padding: 8px 16px; font-size: 14px;">🔄 Refresh</button>
                </div>
            </div>
            <div style="margin-bottom: 10px;">
                <label style="display: inline; margin-right: 15px; font-weight: normal;">
                    Lines:
                    <select id="logLines" onchange="loadLogs()" style="width: auto; display: inline; padding: 5px; margin-left: 5px;">
                        <option value="100">100</option>
                        <option value="200">200</option>
                        <option value="500" selected>500</option>
                        <option value="1000">1000</option>
                        <option value="2000">2000</option>
                    </select>
                </label>
                <span id="logInfo" style="color: #666; font-size: 13px;"></span>
            </div>
            <div id="logViewer" style="background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 12px; max-height: 600px; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word;">
                Loading logs...
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let datasets = [];
        
        async function loadDatasets() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/discover`);
                const data = await res.json();
                datasets = data.datasets;
                
                const select = document.getElementById('dataset');
                if (datasets.length === 0) {
                    select.innerHTML = '<option value="">No datasets found</option>';
                    showError('No datasets found. Check config/datasets.yaml');
                    return;
                }
                
                select.innerHTML = datasets.map(d => 
                    `<option value="${d.name}">${d.name}</option>`
                ).join('');
                
                // Load engines for first dataset
                if (datasets.length > 0) {
                    updateEngines(datasets[0].name);
                }
            } catch (err) {
                showError(`Failed to load datasets: ${err.message}`);
            }
        }
        
        function updateEngines(datasetName) {
            const dataset = datasets.find(d => d.name === datasetName);
            if (!dataset) return;
            
            const engineSelect = document.getElementById('engine');
            engineSelect.innerHTML = dataset.engines.map(e =>
                `<option value="${e}">${e}</option>`
            ).join('');
            
            // Update test procedures dropdown
            const scenarioSelect = document.getElementById('scenario');
            if (dataset.test_procedures && dataset.test_procedures.length > 0) {
                scenarioSelect.innerHTML = dataset.test_procedures.map(p =>
                    `<option value="${p}">${p}</option>`
                ).join('');
                document.getElementById('scenarioInfo').textContent =
                    `Available procedures: ${dataset.test_procedures.length}`;
            } else {
                scenarioSelect.innerHTML = '<option value="search">search</option>';
                document.getElementById('scenarioInfo').textContent =
                    'No test procedures defined, using default';
            }
            
            // Update dataset info
            const info = document.getElementById('datasetInfo');
            info.textContent = `Engines: ${dataset.engines.join(', ')} | Workload: ${dataset.workload}`;
        }
        
        document.getElementById('dataset').addEventListener('change', (e) => {
            updateEngines(e.target.value);
        });
        
        async function loadJobs() {
            try {
                const res = await fetch(`${API_BASE}/api/v1/benchmark`);
                const data = await res.json();
                const list = document.getElementById('jobList');
                
                if (data.jobs.length === 0) {
                    list.innerHTML = '<p style="color: #666;">No jobs yet</p>';
                    return;
                }
                
                list.innerHTML = data.jobs.map(job => {
                    const duration = job.completed_at && job.started_at ? 
                        Math.round((new Date(job.completed_at) - new Date(job.started_at)) / 1000) : null;
                    const durationStr = duration ? `${Math.floor(duration/60)}m ${duration%60}s` : 'N/A';
                    
                    return `
                    <div class="job-item ${job.status}">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <div>
                                <strong>Job ${job.job_id.substring(0, 8)}</strong>
                                <span class="status-badge status-${job.status}">${job.status}</span>
                            </div>
                            <div style="font-size: 12px; color: #666;">
                                ${new Date(job.created_at).toLocaleString()}
                            </div>
                        </div>
                        <div class="info-text">
                            <div>Dataset: ${job.dataset} | Engine: ${job.engine} | Scenario: ${job.scenario}</div>
                            <div>Duration: ${durationStr}</div>
                            ${job.error ? `<div style="color: #d32f2f; margin-top: 4px;">Error: ${job.error}</div>` : ''}
                            ${job.status === 'completed' ?
                                `<div style="margin-top: 8px;">
                                    <a href="/results/${job.job_id}?job_id=${job.job_id}" style="display: inline-block; padding: 6px 12px; background: #667eea; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9em;">📊 View Results</a>
                                    <a href="/api/v1/benchmark/${job.job_id}" target="_blank" style="display: inline-block; padding: 6px 12px; background: #28a745; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9em; margin-left: 8px;">📄 Raw JSON</a>
                                </div>` : ''}
                            ${job.status === 'queued' || job.status === 'running' ?
                                `<div style="margin-top: 8px;">
                                    <button onclick="cancelJob('${job.job_id}')" style="padding: 6px 12px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em;">❌ Cancel Job</button>
                                </div>` : ''}
                        </div>
                    </div>
                `}).join('');
            } catch (err) {
                console.error('Failed to load jobs:', err);
            }
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        document.getElementById('benchmarkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Starting...';
            
            try {
                const payload = {
                    dataset: document.getElementById('dataset').value,
                    engines: document.getElementById('engine').value,
                    scenarios: document.getElementById('scenario').value
                };
                
                const res = await fetch(`${API_BASE}/api/v1/benchmark`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (res.ok) {
                    alert(`Benchmark started! Job ID: ${data.job_id}`);
                    loadJobs();
                } else {
                    showError(data.error || 'Failed to start benchmark');
                }
            } catch (err) {
                showError(`Error: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Start Benchmark';
            }
        });

        async function syncConfig() {
            const btn = document.getElementById('syncBtn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ Pulling from git...';
            
            try {
                const res = await fetch(`${API_BASE}/api/v1/sync`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });
                
                const data = await res.json();
                if (res.ok) {
                    btn.textContent = '✅ Synced!';
                    btn.style.background = '#4caf50';
                    
                    // Reload datasets to reflect changes
                    await loadDatasets();
                    
                    // Show detailed success message
                    let message = data.message || 'Configuration synced successfully!';
                    if (data.git_output && data.git_pull_success) {
                        message += '\n\nGit output:\n' + data.git_output;
                    }
                    alert(message);
                    
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                } else {
                    btn.textContent = '❌ Failed';
                    btn.style.background = '#f44336';
                    showError(data.error || 'Failed to sync configuration');
                    
                    setTimeout(() => {
                        btn.textContent = originalText;
                        btn.style.background = '#4caf50';
                    }, 3000);
                }
            } catch (err) {
                btn.textContent = '❌ Error';
                btn.style.background = '#f44336';
                showError(`Sync error: ${err.message}`);
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '#4caf50';
                }, 3000);
            } finally {
                btn.disabled = false;
            }
        }

        async function loadLogs() {
            try {
                const lines = document.getElementById('logLines').value;
                const res = await fetch(`${API_BASE}/api/v1/logs?lines=${lines}`);
                const data = await res.json();
                
                const viewer = document.getElementById('logViewer');
                const info = document.getElementById('logInfo');
                
                if (res.ok && data.content) {
                    viewer.textContent = data.content;
                    info.textContent = `Showing last ${data.lines} lines from ${data.log_file}`;
                    
                    // Auto-scroll to bottom
                    viewer.scrollTop = viewer.scrollHeight;
                } else {
                    viewer.textContent = data.error || 'Failed to load logs';
                    viewer.style.color = '#f44336';
                }
            } catch (err) {
                document.getElementById('logViewer').textContent = `Error loading logs: ${err.message}`;
                document.getElementById('logViewer').style.color = '#f44336';
            }
        }

        async function cancelJob(jobId) {
            if (!confirm('Are you sure you want to cancel this job?')) {
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/api/v1/benchmark/${jobId}`, {
                    method: 'DELETE'
                });
                
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    loadJobs();
                } else {
                    showError(data.error || 'Failed to cancel job');
                }
            } catch (err) {
                showError(`Error cancelling job: ${err.message}`);
            }
        }

        loadDatasets();
        loadJobs();
        loadLogs();
        
        // Auto-refresh jobs every 5 seconds
        setInterval(loadJobs, 5000);
        
        // Auto-refresh logs every 5 seconds if checkbox is checked
        setInterval(() => {
            if (document.getElementById('autoRefreshLogs').checked) {
                loadLogs();
            }
        }, 5000);
    </script>
</body>
</html>
