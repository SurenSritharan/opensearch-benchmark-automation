<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Benchmark Results</title>
    <script src="https://unpkg.com/@visactor/vchart@1.11.0/build/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Gabarito, "Gabarito Fallback", ui-sans-serif, system-ui, sans-serif;
            background-color: rgb(249, 250, 251);
            background-image:
                radial-gradient(circle at 0% 0%, rgba(49, 130, 237, 0.08), rgba(0, 0, 0, 0) 28%),
                radial-gradient(circle at 100% 0%, rgba(11, 184, 218, 0.06), rgba(0, 0, 0, 0) 24%),
                linear-gradient(rgb(249, 250, 251), rgb(249, 250, 251));
            padding: 20px;
            color: rgb(15, 23, 41);
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8;
        }
        h1 { color: rgb(15, 23, 41); margin-bottom: 10px; font-weight: 700; }
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .back-button:hover { background: #5568d3; }
        .selector-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8;
        }
        .selector-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }
        .selector-box {
            padding: 15px;
            background: #f6f8fa;
            border-radius: 8px;
            border: 2px solid #e1e4e8;
        }
        .selector-box h3 {
            margin-bottom: 10px;
            color: #24292e;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }
        button {
            background: #3b82f6;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
        }
        button:hover { background: #2563eb; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .comparison-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e1e4e8;
        }
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .job-card {
            padding: 20px;
            background: linear-gradient(135deg, #f6f8fa 0%, #ffffff 100%);
            border-radius: 8px;
            border: 2px solid #e1e4e8;
        }
        .job-card h3 {
            margin-bottom: 15px;
            color: #24292e;
            padding-bottom: 10px;
            border-bottom: 2px solid #e1e4e8;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .metric-label {
            font-weight: 600;
            color: #666;
        }
        .metric-value {
            font-weight: 700;
            color: #24292e;
        }
        .metric-better {
            color: #10b981;
        }
        .metric-worse {
            color: #ef4444;
        }
        .chart-container {
            margin: 25px 0;
            padding: 25px;
            background: #fafbfc;
            border-radius: 10px;
            border: 1px solid #e1e4e8;
        }
        .chart-wrapper {
            width: 100%;
            height: 400px;
            margin-top: 15px;
        }
        .loading { text-align: center; padding: 40px; font-size: 18px; color: #666; }
        .error { color: #d32f2f; padding: 20px; background: #ffebee; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Compare Benchmark Results</h1>
            <p style="color: #666; font-size: 14px;">Side-by-side comparison of two test runs</p>
        </div>

        <a href="/" class="back-button">← Back to Dashboard</a>

        <div class="selector-section">
            <h2>Select Jobs to Compare</h2>
            <div class="selector-grid">
                <div class="selector-box">
                    <h3>Job A</h3>
                    <select id="jobA" onchange="updateJobInfo('A')">
                        <option value="">Loading jobs...</option>
                    </select>
                    <div id="jobAInfo" style="margin-top: 10px; font-size: 13px; color: #666;"></div>
                </div>
                <div class="selector-box">
                    <h3>Job B</h3>
                    <select id="jobB" onchange="updateJobInfo('B')">
                        <option value="">Loading jobs...</option>
                    </select>
                    <div id="jobBInfo" style="margin-top: 10px; font-size: 13px; color: #666;"></div>
                </div>
            </div>
            <button onclick="compareJobs()" id="compareBtn" disabled>Compare Jobs</button>
        </div>

        <div id="loading" class="loading" style="display: none;">Loading comparison...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="comparisonResults" style="display: none;">
            <div class="comparison-section">
                <h2>Metrics Comparison</h2>
                <div class="comparison-grid" id="metricsComparison"></div>
            </div>

            <div class="comparison-section">
                <h2>Performance Charts</h2>
                <div class="chart-container">
                    <h3>Latency Comparison</h3>
                    <div id="latencyChart" class="chart-wrapper"></div>
                </div>
                <div class="chart-container">
                    <h3>Throughput Comparison</h3>
                    <div id="throughputChart" class="chart-wrapper"></div>
                </div>
                <div class="chart-container">
                    <h3>Recall Comparison</h3>
                    <div id="recallChart" class="chart-wrapper"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allJobs = [];
        let jobDataCache = {};

        // Load jobs on page load
        async function loadJobs() {
            try {
                const response = await fetch('/api/v1/benchmark');
                const data = await response.json();
                allJobs = data.jobs.filter(job => job.status === 'completed');
                
                const selectA = document.getElementById('jobA');
                const selectB = document.getElementById('jobB');
                
                const options = allJobs.map(job => 
                    `<option value="${job.job_id}">${job.job_id.substring(0, 8)} - ${job.dataset} / ${job.engine} / ${job.scenario || job.ui_scenario}</option>`
                ).join('');
                
                selectA.innerHTML = '<option value="">Select Job A...</option>' + options;
                selectB.innerHTML = '<option value="">Select Job B...</option>' + options;
            } catch (error) {
                console.error('Failed to load jobs:', error);
                showError('Failed to load jobs: ' + error.message);
            }
        }

        function updateJobInfo(which) {
            const select = document.getElementById(`job${which}`);
            const info = document.getElementById(`job${which}Info`);
            const jobId = select.value;
            
            if (!jobId) {
                info.innerHTML = '';
                updateCompareButton();
                return;
            }
            
            const job = allJobs.find(j => j.job_id === jobId);
            if (job) {
                info.innerHTML = `
                    <div><strong>Dataset:</strong> ${job.dataset}</div>
                    <div><strong>Engine:</strong> ${job.engine}</div>
                    <div><strong>Scenario:</strong> ${job.scenario || job.ui_scenario}</div>
                    <div><strong>Completed:</strong> ${new Date(job.completed_at).toLocaleString()}</div>
                `;
            }
            
            updateCompareButton();
        }

        function updateCompareButton() {
            const jobA = document.getElementById('jobA').value;
            const jobB = document.getElementById('jobB').value;
            const btn = document.getElementById('compareBtn');
            btn.disabled = !jobA || !jobB || jobA === jobB;
        }

        async function compareJobs() {
            const jobAId = document.getElementById('jobA').value;
            const jobBId = document.getElementById('jobB').value;
            
            if (!jobAId || !jobBId) {
                showError('Please select both jobs to compare');
                return;
            }
            
            if (jobAId === jobBId) {
                showError('Please select two different jobs');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').style.display = 'none';
            document.getElementById('comparisonResults').style.display = 'none';
            
            try {
                // Fetch both job results
                const [dataA, dataB] = await Promise.all([
                    fetchJobResults(jobAId),
                    fetchJobResults(jobBId)
                ]);
                
                displayComparison(dataA, dataB);
            } catch (error) {
                showError('Failed to load comparison: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function fetchJobResults(jobId) {
            if (jobDataCache[jobId]) {
                return jobDataCache[jobId];
            }
            
            const response = await fetch(`/api/v1/benchmark/${jobId}/results`);
            if (!response.ok) {
                throw new Error(`Failed to fetch results for job ${jobId}`);
            }
            
            const data = await response.json();
            jobDataCache[jobId] = data;
            return data;
        }

        function displayComparison(dataA, dataB) {
            document.getElementById('comparisonResults').style.display = 'block';
            
            // Extract metrics from first sweep of each job
            const sweepA = dataA.sweeps[0];
            const sweepB = dataB.sweeps[0];
            
            if (!sweepA || !sweepB) {
                showError('One or both jobs have no sweep data');
                return;
            }
            
            const metricsA = extractMetrics(sweepA);
            const metricsB = extractMetrics(sweepB);
            
            displayMetricsComparison(metricsA, metricsB, dataA.job, dataB.job);
            displayCharts(metricsA, metricsB, dataA.job, dataB.job);
        }

        function extractMetrics(sweep) {
            const testRun = sweep.test_run;
            const opMetrics = testRun?.results?.op_metrics;
            const correctnessMetrics = testRun?.results?.correctness_metrics;
            
            return {
                latency: opMetrics?.['vector-search']?.['50_0_percentile_latency_ms'] || 
                         opMetrics?.['vector-search']?.['50_0_percentile_latency'] || null,
                throughput: opMetrics?.['vector-search']?.throughput || null,
                recallAtK: correctnessMetrics?.['vector-search']?.['recall@k'] || null,
                recallAt1: correctnessMetrics?.['vector-search']?.['recall@1'] || null
            };
        }

        function displayMetricsComparison(metricsA, metricsB, jobA, jobB) {
            const container = document.getElementById('metricsComparison');
            
            const cardA = `
                <div class="job-card">
                    <h3>Job A: ${jobA.job_id.substring(0, 8)}</h3>
                    <div class="metric-row">
                        <span class="metric-label">Dataset:</span>
                        <span class="metric-value">${jobA.dataset}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Engine:</span>
                        <span class="metric-value">${jobA.engine}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Latency (p50):</span>
                        <span class="metric-value ${metricsA.latency < metricsB.latency ? 'metric-better' : 'metric-worse'}">
                            ${metricsA.latency ? metricsA.latency.toFixed(2) + ' ms' : 'N/A'}
                        </span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Throughput:</span>
                        <span class="metric-value ${metricsA.throughput > metricsB.throughput ? 'metric-better' : 'metric-worse'}">
                            ${metricsA.throughput ? metricsA.throughput.toFixed(2) + ' ops/s' : 'N/A'}
                        </span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Recall@k:</span>
                        <span class="metric-value ${metricsA.recallAtK > metricsB.recallAtK ? 'metric-better' : 'metric-worse'}">
                            ${metricsA.recallAtK ? (metricsA.recallAtK * 100).toFixed(2) + '%' : 'N/A'}
                        </span>
                    </div>
                </div>
            `;
            
            const cardB = `
                <div class="job-card">
                    <h3>Job B: ${jobB.job_id.substring(0, 8)}</h3>
                    <div class="metric-row">
                        <span class="metric-label">Dataset:</span>
                        <span class="metric-value">${jobB.dataset}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Engine:</span>
                        <span class="metric-value">${jobB.engine}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Latency (p50):</span>
                        <span class="metric-value ${metricsB.latency < metricsA.latency ? 'metric-better' : 'metric-worse'}">
                            ${metricsB.latency ? metricsB.latency.toFixed(2) + ' ms' : 'N/A'}
                        </span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Throughput:</span>
                        <span class="metric-value ${metricsB.throughput > metricsA.throughput ? 'metric-better' : 'metric-worse'}">
                            ${metricsB.throughput ? metricsB.throughput.toFixed(2) + ' ops/s' : 'N/A'}
                        </span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Recall@k:</span>
                        <span class="metric-value ${metricsB.recallAtK > metricsA.recallAtK ? 'metric-better' : 'metric-worse'}">
                            ${metricsB.recallAtK ? (metricsB.recallAtK * 100).toFixed(2) + '%' : 'N/A'}
                        </span>
                    </div>
                </div>
            `;
            
            container.innerHTML = cardA + cardB;
        }

        function displayCharts(metricsA, metricsB, jobA, jobB) {
            // Latency Chart
            if (metricsA.latency && metricsB.latency) {
                const latencySpec = {
                    type: 'bar',
                    data: [{
                        id: 'latency',
                        values: [
                            { job: `Job A (${jobA.engine})`, value: metricsA.latency },
                            { job: `Job B (${jobB.engine})`, value: metricsB.latency }
                        ]
                    }],
                    xField: 'job',
                    yField: 'value',
                    axes: [
                        { orient: 'bottom', type: 'band' },
                        { orient: 'left', type: 'linear', title: { visible: true, text: 'Latency (ms)' } }
                    ],
                    color: ['#3b82f6', '#10b981']
                };
                new VChart.default(latencySpec, { dom: 'latencyChart' }).renderSync();
            }
            
            // Throughput Chart
            if (metricsA.throughput && metricsB.throughput) {
                const throughputSpec = {
                    type: 'bar',
                    data: [{
                        id: 'throughput',
                        values: [
                            { job: `Job A (${jobA.engine})`, value: metricsA.throughput },
                            { job: `Job B (${jobB.engine})`, value: metricsB.throughput }
                        ]
                    }],
                    xField: 'job',
                    yField: 'value',
                    axes: [
                        { orient: 'bottom', type: 'band' },
                        { orient: 'left', type: 'linear', title: { visible: true, text: 'Throughput (ops/s)' } }
                    ],
                    color: ['#3b82f6', '#10b981']
                };
                new VChart.default(throughputSpec, { dom: 'throughputChart' }).renderSync();
            }
            
            // Recall Chart
            if (metricsA.recallAtK && metricsB.recallAtK) {
                const recallSpec = {
                    type: 'bar',
                    data: [{
                        id: 'recall',
                        values: [
                            { job: `Job A (${jobA.engine})`, value: metricsA.recallAtK * 100 },
                            { job: `Job B (${jobB.engine})`, value: metricsB.recallAtK * 100 }
                        ]
                    }],
                    xField: 'job',
                    yField: 'value',
                    axes: [
                        { orient: 'bottom', type: 'band' },
                        { orient: 'left', type: 'linear', min: 0, max: 100, title: { visible: true, text: 'Recall@k (%)' } }
                    ],
                    color: ['#3b82f6', '#10b981']
                };
                new VChart.default(recallSpec, { dom: 'recallChart' }).renderSync();
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Load jobs on page load
        loadJobs();
    </script>
</body>
</html>
