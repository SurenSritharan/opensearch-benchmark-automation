# OpenSearch Cluster Configuration
# This file contains cluster-specific settings for the benchmark automation

# Cluster endpoint configuration
# Format: hostname:port
cluster_endpoint: "opensearch-cluster:9200"

# Client options for OpenSearch Benchmark
# These are passed as --client-options to opensearch-benchmark
client_options:
  timeout: 300
  use_ssl: true
  verify_certs: false
  basic_auth_user: "admin"
  basic_auth_password: "admin"

# Pod discovery configuration for profiling
# Label selector to find OpenSearch data nodes for profiling
# Use "app=opensearch-data" for separated architecture or "app=opensearch-cluster" for combined
pod_label_selector: "app=opensearch-data"

# Profiling configuration
# Enable or disable async-profiler flame graph generation during benchmarks
profiling:
  enabled: true  # Set to false to disable profiling globally
  warmup_seconds: 0  # Seconds to wait before starting profiling (default: 60)
  duration_seconds: 45  # Duration of profiling window in seconds (default: 45)

# Metrics collection configuration
# Enable or disable GKE resource metrics collection and graphing
metrics:
  enabled: true  # Set to false to disable metrics collection globally
  interval_seconds: 10  # Seconds between metric samples (default: 10)
  generate_graphs: true  # Automatically generate graphs after collection (default: true)

# Telemetry collection configuration
# Comprehensive diagnostics including cluster state, server logs, and GKE metrics
telemetry:
  enabled: true  # Set to false to disable telemetry collection globally
  collect_per_scenario: false  # If true, collect telemetry before/after each scenario; if false, only per run
  pre_run_log_lines: 1000  # Number of log lines to collect before run (default: 1000)
  post_run_log_lines: 5000  # Number of log lines to collect after run (default: 5000)
  collect_on_failure: true  # Always collect post-run telemetry even on failures (default: true)

