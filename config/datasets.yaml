# Dataset Configuration Registry

datasets:
  # Official vectorsearch workload datasets
  cohere-1m:
    dimension: 768
    format: hdf5
    space_type: "innerproduct"
    description: "Cohere 1M embeddings dataset with 768-dimensional vectors (official workload)"
    workload_name: "vectorsearch"
    is_official: true
    corpus_name: "cohere-1m"
    # Parameter files for different engines
    param_files:
      faiss: "params/faiss-cohere-1m-768-dp.json"
      lucene: "params/lucene-cohere-1m-768-dp.json"
      jvector: "params/jvector-cohere-1m-768-dp.json"
    test_procedures:
      index: "no-train-test-index-only"     # Default
      bulk: "no-train-test"                 # Default
      search: "search-only-no-warmup"       # Custom: skips warmup-indices task
      merge: "force-merge-index"            # Force merge to consolidate segments
  
  # Custom workload datasets
  msmarco:
    dimension: 1024
    format: fvec
    space_type: "cosinesimil"
    description: "MS MARCO passage ranking dataset with 1024-dimensional vectors (custom workload)"
    workload_name: "msmarco"
    is_official: false
    custom_workload: "workloads/msmarco"
    data_dir: "/datasets/msmarco"
    data_files:
      - name: "cohere_msmarco_base.fvec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_base.fvec"
        range: "0-4100000000"
        size: "~4.1GB"
      - name: "cohere_msmarco_distances_d1024_k10_1m.fvec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_distances_d1024_k10_1m.fvec"
      - name: "cohere_msmarco_indices_d1024_k10_1m.ivec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_indices_d1024_k10_1m.ivec"
    # Parameter files for different engines
    param_files:
      jvector: "params/jvector-params.json"
      faiss: "params/faiss-params.json"
      lucene: "params/lucene-params.json"
    # Test procedures for msmarco
    test_procedures:
      index: "index-only"
      bulk: "bulk-ingest"
      search: "search-only"
      merge: "force-merge"

# Default dataset to use if none specified
default: cohere-1m

