# Dataset Configuration Registry

datasets:
  cohere-1m:
    dimension: 768
    format: hdf5
    space_type: "innerproduct"
    description: "Cohere 1M embeddings dataset with 768-dimensional vectors"
    workload: "vectorsearch" # needs to match opensearch-benchmark-workloads folder
    corpus_name: "cohere-1m"
    
    # Common parameters shared across all scenarios
    common_params:
      target_index_name: "cohere-1m-index"
      target_field_name: "target_field"
      id_field_name: "_id"
    
    # Engine-specific parameters (override or extend common_params)
    # These are used across multiple scenarios for this engine
    engine_params:
      faiss:
        engine: "faiss"
      
      lucene:
        engine: "lucene"
      
      jvector:
        engine: "jvector"
    
    # Test procedures with their base parameters
    test_procedures:
      - name: "create-index-only"
        params:
          target_index_body: "indices/index.json"
          target_index_primary_shards: 3
          target_index_replica_shards: 1
          target_index_dimension: 768
          target_index_space_type: "innerproduct"
          train_index_name: "cohere-1m-train-index"
          train_index_body: "indices/train-index.json"
          hnsw_ef_construction: 128
          hnsw_m: 16
        # Engine-specific parameters for index creation
        engine_params:
          faiss:
            method_name: "hnsw"
          lucene:
            method_name: "hnsw"
          jvector:
            method_name: "disk_ann"
            mode: "in_memory"
      
      - name: "bulk-ingest-only"
        params:
          target_index_bulk_size: 500
          target_index_bulk_index_data_set_format: "hdf5"
          target_index_bulk_index_data_set_corpus: "cohere-1m"
          target_index_num_vectors: 1000000
      
      - name: "search-only"
        params:
          query_data_set_format: "hdf5"
          query_data_set_corpus: "cohere-1m"
          neighbors_data_set_format: "hdf5"
          neighbors_data_set_corpus: "cohere-1m"
          query_body:
            docvalue_fields: ["_id"]
            stored_fields: "_none_"
            _source: false
          number_of_repetitions: 1000
        parameter_sweeps:
          - params:
              query_k: 10
              search_clients: 2
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              search_clients: 4
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              search_clients: 8
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              search_clients: 16
              warmup_time_period: 60
              time_period: 300
      
      - name: "search-only"
        params:
          query_data_set_format: "hdf5"
          query_data_set_corpus: "cohere-1m"
          neighbors_data_set_format: "hdf5"
          neighbors_data_set_corpus: "cohere-1m"
          query_body:
            docvalue_fields: ["_id"]
            stored_fields: "_none_"
            _source: false
          number_of_repetitions: 1000
        parameter_sweeps:
          - params:
              query_k: 100
              search_clients: 2
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 100
              search_clients: 4
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 100
              search_clients: 8
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 100
              search_clients: 16
              warmup_time_period: 60
              time_period: 300
  msmarco:
    dimension: 1024
    format: fvec
    space_type: "cosinesimil"
    description: "MS MARCO passage ranking dataset with 1024-dimensional vectors"
    index_name: cohere-msmarco-1024
    workload: "msmarco" # needs to match opensearch-benchmark-workloads folder
    data_dir: "/datasets/msmarco"
    
    # Common parameters shared across all scenarios
    common_params:
      target_index_name: "cohere-msmarco-1024"
      target_field_name: "vector"
      space_type: "cosinesimil"
      ground_truth_files:
        10: "/datasets/msmarco/cohere_msmarco_indices_d1024_k10_1m.ivec"
        100: "/datasets/msmarco/cohere_msmarco_indices_d1024_k100_1m.ivec"
    
    # Engine-specific parameters (used across scenarios)
    engine_params:
      jvector:
        engine: "jvector"
      faiss:
        engine: "faiss"
      lucene:
        engine: "lucene"

    data_files:
      - name: "cohere_msmarco_base.fvec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_base.fvec"
        range: "0-4100000000"
        size: "~4.1GB"
      - name: "cohere_msmarco_indices_d1024_k100_1m.ivec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_indices_d1024_k100_1m.ivec"
      - name: "cohere_msmarco_indices_d1024_k10_1m.ivec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_indices_d1024_k10_1m.ivec"
      - name: "cohere_msmarco_queries.fvec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_queries.fvec"
    # Test procedures for msmarco
    test_procedures:
      - name: "create-index-only"
        params:
          target_index_body: "indices/index.json"
          target_index_primary_shards: 3
          target_index_replica_shards: 1
          target_index_dimension: 1024
        engine_params:
          jvector:
            method_name: "disk_ann"
            mode: "in_memory"
          faiss:
            method_name: "hnsw"
          lucene:
            method_name: "hnsw"
      
      - name: "bulk-ingest-only"
        params:
          target_index_bulk_size: 500
          target_index_bulk_index_data_set_path: "/datasets/msmarco/cohere_msmarco_base.fvec"
          target_index_num_vectors: 1000000
      
      - name: "refresh"
        params: {}
      
      - name: "force-merge"
        params:
          target_index_max_num_segments: 1
      
      - name: "vector-search"
        params:
          queries_file: "/datasets/msmarco/cohere_msmarco_queries.fvec"
          query_body:
            docvalue_fields: ["_id"]
            stored_fields: "_none_"
            _source: false
        parameter_sweeps:
          - params:
              query_k: 100
              ef_search: 100
              search_clients: 2
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 100
              ef_search: 100
              search_clients: 4
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 100
              ef_search: 100
              search_clients: 8
              warmup_time_period: 60
              time_period: 300
          - params:
              # shard level find top k vectors
              query_k: 100
              #(Exploration Factor for Search) is a crucial query-time hyperparameter used in Approximate Nearest Neighbor (ANN) vector search, specifically within the Hierarchical Navigable Small World (HNSW) graph algorithm.
              ef_search: 100
              search_clients: 16
              warmup_time_period: 60
              time_period: 300              
              # warmup_iterations: 100
              # iterations: 500
      - name: "vector-search"
        parameter_sweeps:
          - params:
              query_k: 10
              ef_search: 32
              search_clients: 2
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              ef_search: 32
              search_clients: 4
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              ef_search: 32
              search_clients: 8
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              ef_search: 32
              search_clients: 16
              warmup_time_period: 60
              time_period: 300
              # warmup_iterations: 100
              # iterations: 1000

    

# Default dataset to use if none specified
default: msmarco

