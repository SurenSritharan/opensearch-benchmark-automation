# Dataset Configuration Registry

datasets:
  cohere-1m:
    dimension: 768
    format: hdf5
    space_type: "innerproduct"
    description: "Cohere 1M embeddings dataset with 768-dimensional vectors"
    workload: "vectorsearch" # needs to match opensearch-benchmark-workloads folder
    corpus_name: "cohere-1m"
    # Parameter files for different engines
    param_files:
      faiss: "params/1million/faiss-cohere-1m-768-dp.json"
      lucene: "params/1million/lucene-cohere-1m-768-dp.json"
      jvector: "params/1million/jvector-cohere-1m-768-dp.json"
    test_procedures:
      - name: "create-index-only"
      - name: "bulk-ingest-only" 
      - name: "search-only-no-warmup" 
      - name: "force-merge-index" 
  
  msmarco:
    dimension: 1024
    format: fvec
    space_type: "cosinesimil"
    description: "MS MARCO passage ranking dataset with 1024-dimensional vectors"
    index_name: cohere-msmarco-1024
    workload: "msmarco" # needs to match opensearch-benchmark-workloads folder
    data_dir: "/datasets/msmarco"
    # Common parameters shared across all engines
    default_params:
      # Index configuration (common to all engines)
      target_index_name: "cohere-msmarco-1024"
      target_index_body: "indices/index.json"
      target_index_primary_shards: 3
      target_index_replica_shards: 1
      target_index_dimension: 1024
      target_index_max_num_segments: 1
      target_field_name: "vector"
      space_type: "cosinesimil"
      query_body:
        docvalue_fields: ["_id"]
        stored_fields: "_none_"
        _source: false
      
      # Query configuration (common)
      queries_file: "/datasets/msmarco/cohere_msmarco_queries.fvec"
      
      # Ground truth file mapping based on k value
      ground_truth_files:
        10: "/datasets/msmarco/cohere_msmarco_indices_d1024_k10_1m.ivec"
        100: "/datasets/msmarco/cohere_msmarco_indices_d1024_k100_1m.ivec"
    
    # Engine-specific parameters (override or extend default_params)
    engine_params:
      jvector:
        engine: "jvector"
        method_name: "disk_ann"
        mode: "in_memory"
      
      faiss:
        engine: "faiss"
        method_name: "hnsw"
      
      lucene:
        engine: "lucene"
        method_name: "hnsw"

    data_files:
      - name: "cohere_msmarco_base.fvec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_base.fvec"
        range: "0-4100000000"
        size: "~4.1GB"
      - name: "cohere_msmarco_indices_d1024_k100_1m.ivec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_indices_d1024_k100_1m.ivec"
      - name: "cohere_msmarco_indices_d1024_k10_1m.ivec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_indices_d1024_k10_1m.ivec"
      - name: "cohere_msmarco_queries.fvec"
        url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco/cohere_msmarco_queries.fvec"
    # Test procedures for msmarco
    test_procedures:
      - name: "create-index-only"
      - name: "bulk-ingest-only"
      - name: "refresh"
      - name: "force-merge"         
      - name: "vector-search"
        parameter_sweeps:
          - params:
              # shard level find top k vectors
              query_k: 100
              #(Exploration Factor for Search) is a crucial query-time hyperparameter used in Approximate Nearest Neighbor (ANN) vector search, specifically within the Hierarchical Navigable Small World (HNSW) graph algorithm.
              ef_search: 100
              search_clients: 1
              warmup_time_period: 60
              time_period: 300
          - params:
              # shard level find top k vectors
              query_k: 100
              #(Exploration Factor for Search) is a crucial query-time hyperparameter used in Approximate Nearest Neighbor (ANN) vector search, specifically within the Hierarchical Navigable Small World (HNSW) graph algorithm.
              ef_search: 100
              search_clients: 2
              warmup_time_period: 60
              time_period: 300
          - params:
              # shard level find top k vectors
              query_k: 100
              #(Exploration Factor for Search) is a crucial query-time hyperparameter used in Approximate Nearest Neighbor (ANN) vector search, specifically within the Hierarchical Navigable Small World (HNSW) graph algorithm.
              ef_search: 100
              search_clients: 4
              warmup_time_period: 60
              time_period: 300
          - params:
              # shard level find top k vectors
              query_k: 100
              #(Exploration Factor for Search) is a crucial query-time hyperparameter used in Approximate Nearest Neighbor (ANN) vector search, specifically within the Hierarchical Navigable Small World (HNSW) graph algorithm.
              ef_search: 100
              search_clients: 8
              warmup_time_period: 60
              time_period: 300              # warmup_iterations: 100 # needs to be smaller than the number of queries for throughput metrics
              # iterations: 500
      - name: "vector-search"
        parameter_sweeps:
          - params:
              query_k: 10
              ef_search: 32
              search_clients: 1
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              ef_search: 32
              search_clients: 2
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              ef_search: 32
              search_clients: 4
              warmup_time_period: 60
              time_period: 300
          - params:
              query_k: 10
              ef_search: 32
              search_clients: 8
              warmup_time_period: 60
              time_period: 300
              # warmup_iterations: 100 # needs to be smaller than the number of queries for throughput metrics
              # iterations: 1000

    

# Default dataset to use if none specified
default: msmarco

