# Dataset Configuration Registry

datasets:
  cohere-wiki-en-768:
    dimension: 768
    format: hdf5
    space_type: "innerproduct"
    description: "Cohere embeddings dataset with 768-dimensional vectors - configurable corpus size"
    workload: "vectorsearch" # needs to match opensearch-benchmark-workloads folder
    
    # Common parameters shared across all scenarios
    common_params:
      target_index_name: "cohere-wiki-en-768-{{corpus_size}}"
      target_field_name: "target_field"
      id_field_name: "_id"
      corpus_size: "{{corpus_size}}"  # Pass to workload for dynamic resolution
      corpus_name: "cohere-{{corpus_size}}"  # Dynamic corpus name
    
    # Engine-specific parameters (override or extend common_params)
    # These are used across multiple scenarios for this engine
    engine_params:
      faiss:
        engine: "faiss"
      
      lucene:
        engine: "lucene"
      
      jvector:
        engine: "jvector"
    
    # Test procedures with their base parameters
    test_procedures:
      - name: "create-index-only"
        params:
          target_index_body: "indices/index.json"
          target_index_primary_shards: 3
          target_index_replica_shards: 1
          target_index_dimension: 768
          target_index_space_type: "innerproduct"
          train_index_name: "cohere-768-train-index"
          train_index_body: "indices/train-index.json"
          hnsw_ef_construction: 128
          hnsw_m: 16
        # Engine-specific parameters for index creation
        engine_params:
          faiss:
            method_name: "hnsw"
          lucene:
            method_name: "hnsw"
          jvector:
            method_name: "disk_ann"
            mode: "in_memory"
      
        # uses bulk-vector-data-set which internally loads HDF5 corpus file
      - name: "bulk-ingest-only"
        params:
          target_index_bulk_size: 500
          target_index_bulk_index_data_set_format: "hdf5"
          target_index_bulk_index_data_set_corpus: "{{corpus_name}}"
          target_index_bulk_indexing_clients: 8
          # target_index_num_vectors will be calculated dynamically based on corpus_size

      - name: "refresh"
        params: {}
      
      - name: "force-merge"
        params:
          target_index_max_num_segments: 1
      
      - name: "vector-search"
        params:
          # reads queries and ground truth from HDF5 corpus file (instead of generating from blobs)
          query_data_set_format: "hdf5"
          query_data_set_corpus: "{{corpus_name}}"
          neighbors_data_set_format: "hdf5"
          neighbors_data_set_corpus: "{{corpus_name}}"
          query_body:
            docvalue_fields: ["_id"]
            stored_fields: "_none_"
            _source: false
          number_of_repetitions: 1000
          warmup_time_period: 60
          time_period: 300
          hnsw_ef_search: 128
        parameter_sweeps:
          - params: { search_clients: 4 }
          - params: { search_clients: 8 }
          - params: { search_clients: 10 }
          - params: { search_clients: 12 }
          - params: { search_clients: 16 }
  cohere-msmarco-1024:
    dimension: 1024
    format: fvec
    space_type: "cosinesimil"
    description: "MS MARCO passage ranking dataset with 1024-dimensional vectors - configurable corpus size"
    workload: "msmarco" # needs to match opensearch-benchmark-workloads folder
    data_dir: "/datasets/msmarco"
    
    # Supported corpus sizes (ground truth files available for k=100)
    # All sizes from 2m to 125m are supported
    supported_corpus_sizes: [
      "1m", "2m", "4m", "5m", "8m", "10m", "15m", "16m", "20m", "25m", "30m", "32m",
      "40m", "45m", "50m", "55m", "60m", "64m", "65m", "70m", "75m", "80m", "85m",
      "90m", "100m", "125m", "128m"
    ]
    
    # Supported k values for ground truth
    supported_k_values: [10, 100]  # k=100 ground truth available for all supported sizes
    
    # Common parameters shared across all scenarios
    common_params:
      target_index_name: "cohere-msmarco-1024-{{corpus_size}}"
    
    # Engine-specific parameters (used across scenarios)
    engine_params:
      jvector:
        engine: "jvector"
      faiss:
        engine: "faiss"
      lucene:
        engine: "lucene"

    # Base URL for all msmarco data files
    base_url: "https://jvector-datasets-infratest.s3.us-east-2.amazonaws.com/6174752eb60168112f2edb38493782da2ebe5ae6bfc870e25ed1711205e5395d_private/cohere/cohere_msmarco"
    
    data_files:
      - name: "cohere_msmarco_base.fvec"
        url: "{{base_url}}/cohere_msmarco_base.fvec"
        # Range automatically calculated based on corpus_size and dimension
      - name: "cohere_msmarco_queries.fvec"
        url: "{{base_url}}/cohere_msmarco_queries.fvec"
    # Test procedures for msmarco
    test_procedures:
      - name: "create-index-only"
        params:
          target_index_body: "indices/index.json"
          target_index_primary_shards: 3
          target_index_replica_shards: 1
          target_index_dimension: 1024
          target_field_name: "vector"
          target_index_space_type: "cosinesimil"
          hnsw_ef_construction: 128
          hnsw_m: 16
        engine_params:
          jvector:
            method_name: "disk_ann"
            mode: "in_memory"
          faiss:
            method_name: "hnsw"
          lucene:
            method_name: "hnsw"
      
      - name: "bulk-ingest-only"
        params:
          target_index_bulk_size: 5000
          target_index_bulk_index_data_set_path: "/datasets/msmarco/cohere_msmarco_base_{{corpus_size}}.fvec"
          target_index_bulk_indexing_clients: 8
      
      - name: "refresh"
        params: {}
      
      - name: "force-merge"
        params:
          target_index_max_num_segments: 1
      
      - name: "vector-search"
        params:
          queries_file: "/datasets/msmarco/cohere_msmarco_queries.fvec"
          ground_truth_file: "/datasets/msmarco/cohere_msmarco_indices_d1024_k{{query_k}}_{{corpus_size}}.ivec"
          target_field_name: "vector"
          query_body:
            docvalue_fields: ["_id"]
            stored_fields: "_none_"
            _source: false
          warmup_time_period: 60
          time_period: 300
          hnsw_ef_search: 128
        parameter_sweeps:
          - params: { search_clients: 4 }
          - params: { search_clients: 8 }
          - params: { search_clients: 10 }
          - params: { search_clients: 12 }
          - params: { search_clients: 16 }

    

# Default dataset to use if none specified
default: msmarco

